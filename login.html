<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your ShopBangla account to manage orders, wishlist, and profile.">
    <title>Login | ShopBangla</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header class="site-header" role="banner">
        <div class="logo">
            <a href="index.html" aria-label="ShopBangla home page">
                <h1>Shop<span>Bangla</span></h1>
            </a>
        </div>

        <nav class="site-nav" aria-label="Primary navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>

        <form class="search-box" role="search">
            <label class="sr-only" for="site-search">Search products</label>
            <input id="site-search" name="site-search" type="search" placeholder="Search products...">
            <button type="submit" aria-label="Search products"><i class="fas fa-search"></i></button>
        </form>
    </header>

    <main id="main-content">
        <section class="login-page" aria-labelledby="login-title">
            <div class="login-card">
                <h2 id="login-title">Login</h2>
                <form class="login-form">
                    <div class="input-box">
                        <label for="email">Email Address</label>
                        <input id="email" name="email" type="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-box">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn">Login</button>

                    <p class="register-link">
                        Don't have an account?
                        <a href="register.html">Register Now</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <h2>ShopBangla</h2>
            <p>Your trusted online shopping partner.</p>
            <div class="footer-links">
                <a href="products.html">Products</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <p>&copy; 2025 ShopBangla. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
