<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ShopBangla</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header class="header">

    <div class="logo">
        <h2>Shop<span>Bangla</span></h2>
    </div>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
    </nav>

    <div class="header-icons">
        <a href="wishlist.html"><i class="fas fa-heart"></i></a>
        <a href="cart.html"><i class="fas fa-shopping-cart"></i></a>
        <a href="login.html"><i class="fas fa-user"></i></a>
    </div>

</header>

<section class="contact">

    <div class="section-title">
        <h2>Contact Us</h2>
        <p>We would love to hear from you.</p>
    </div>

    <form>

        <input type="text" placeholder="Your Name" required>

        <input type="email" placeholder="Your Email" required>

        <input type="text" placeholder="Subject" required>

        <textarea rows="6" placeholder="Write your message..." required></textarea>

        <button type="submit" class="btn">
            Send Message
        </button>

    </form>

</section>

<footer>

    <div class="footer-content">

        <h2>ShopBangla</h2>

        <p>Fast, Safe & Trusted Online Shopping.</p>

        <p>© 2026 ShopBangla. All Rights Reserved.</p>

    </div>

</footer>

<script src="script.js"></script>

</body>
